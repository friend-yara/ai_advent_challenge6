meta:
  title: Project Invariants

stack:
  language: Python 3.12
  platform: Ubuntu 24.04, SSH-only
  shell: Bash 5.2
  environment: "venv (.venv), PEP 668 compliant — no system-level pip installs"

api:
  endpoint: "https://api.openai.com/v1/responses"
  sdk_allowed: false
  http_client: requests only
  api_key_source: OPENAI_API_KEY environment variable

architecture:
  core_files:
    - agent.py
    - llm_agent_cli.py
  no_web_framework: true
  no_gui: true
  no_browser: true
  minimal_dependencies: true
  dependency_policy: add only when necessary, always pin versions
  persistence: TOON file format only

budget:
  preferred_model: gpt-4.1-mini
  heavy_model: gpt-4.1
  token_efficiency: high — avoid redundant context

banned:
  - rule: "No SDK wrappers (openai, langchain, etc.)"
    patterns:
      - "import openai"
      - "from openai"
      - "openai\\.Client"
      - "OpenAI\\("
      - "openai\\.chat"
      - "openai\\.completions"
      - "import langchain"
      - "from langchain"
      - "langchain\\."
  - rule: "No system-wide pip installs"
    patterns:
      - "sudo pip"
      - "pip3?\\s+install(?!\\s+--user)(?!\\s+-r\\s)"
  - rule: "No GUI or browser-based tools"
    patterns:
      - "\\btkinter\\b"
      - "\\bPyQt\\b"
      - "\\bwxPython\\b"
      - "\\bpygame\\b"
      - "\\bpyautogui\\b"
      - "\\bselenium\\b"
      - "\\bplaywright\\b"
      - "\\bpuppeteer\\b"
  - rule: "No cloud storage or external APIs beyond OpenAI"
    patterns:
      - "\\bboto3\\b"
      - "\\bfirebase\\b"
      - "\\bsupabase\\b"
      - "\\baws_\\w+\\b"
  - rule: "No OpenAI SDK — raw HTTP via requests only"
    patterns:
      - "import openai"
      - "from openai"
      - "openai\\.Client"
      - "OpenAI\\("
  - rule: "No web framework, no GUI, no browser"
    patterns:
      - "\\bflask\\b"
      - "\\bdjango\\b"
      - "\\bfastapi\\b"
      - "\\btkinter\\b"
      - "\\bselenium\\b"
  - rule: "No database — file-based persistence only (TOON format)"
    patterns:
      - "\\bsqlalchemy\\b"
      - "\\bpsycopg2\\b"
      - "\\bdjango\\.db\\b"
      - "\\bsqlite3\\b"
